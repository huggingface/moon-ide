<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<!-- interactive-widget: shrink the layout viewport when the
		     on-screen keyboard opens so the composer stays visible
		     (Android Chrome; a no-op elsewhere). -->
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content"
		/>
		<meta name="theme-color" content="#0d1117" />
		<link rel="manifest" href="/manifest.webmanifest" />
		<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
		<!-- iOS ignores the manifest for add-to-home-screen; it wants
		     its own icon link + meta tags. -->
		<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="moon-ide" />
		<title>moon-ide companion</title>
	</head>
	<body>
		<div id="app"></div>
		<script type="module" src="/src/main.ts"></script>
	</body>
</html>
